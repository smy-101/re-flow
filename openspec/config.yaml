schema: spec-driven

# =============================================================================
# re-flow — OpenSpec 项目配置
# 采用 SDD + TDD（Spec-Driven Development + Test-Driven Development）模式：
# 先规格，再先测后码
#
# SDD/TDD 开发流程：
#   1. /opsx:propose <change-name>  — 生成 proposal / specs / design / tasks
#   2. /opsx:apply                  — 按 tasks 执行 TDD（先写测试→验证失败→实现功能→回归通过）
#   3. /opsx:archive                — 归档已完成的 change，更新 specs
# =============================================================================

# 项目上下文（注入到每个 artifact 的 AI 提示中）
context: |
  项目名称：re-flow
  文档语言策略：
    - OpenSpec 产物（proposal/specs/design/tasks）统一使用简体中文（zh-CN）
    - 标题、正文、说明、任务描述均使用简体中文
    - 仅在不可替代的技术名词、命令、代码标识符中保留英文（如 Next.js、TypeScript、pnpm、API）
    - 同一份文档中不得出现中英文混写段落（术语除外）
  技术栈：
    - 框架：Next.js 16（App Router）
    - 语言：TypeScript 5（严格模式，tsconfig.json strict: true）
    - UI：React 19 + Tailwind CSS 4
    - 包管理：pnpm
    - 数据库：Drizzle ORM + SQLite（better-sqlite3 驱动，同步 API）
    - 认证：JWT（jose v6，7 天有效期）+ bcrypt v6（cost factor 10）
    - 限流：内存级速率限制中间件（5 req/min，lib/auth/rate-limit.ts）
    - RSS 解析：rss-parser（10 秒超时）
    - 后台任务：node-cron（rss-worker，每 30 分钟自动拉取）
    - 代码规范：ESLint（eslint-config-next）
    - 单元测试：Vitest + React Testing Library + fast-check（属性测试）
      测试文件放在 __tests__/（镜像 lib/ 和 app/ 结构）或 *.test.ts(x) 旁置
    - 类型检查：pnpm exec tsc --noEmit（CI 强制通过，不允许 any 和 ts-ignore）

  目录约定：
    - app/             — Next.js App Router 页面与布局
    - app/api/         — RESTful API 路由（auth / feeds / items / categories / ai-configs / craft-templates）
    - app/(dashboard)/ — 登录后的仪表盘布局与页面
    - app/(dashboard)/settings/ — 设置页面（AI 配置、Craft 模板）
    - components/      — 可复用 UI 组件（feeds / items / layout / ui / ai / craft）
    - hooks/           — 自定义 React Hooks（useSidebar / useMobileDrawer）
    - lib/auth/        — 认证工具（JWT、密码哈希、限流、IP 提取、加密）
    - lib/db/          — Drizzle schema、migrations、queries
    - lib/rss/         — RSS 拉取与解析逻辑（fetcher.ts）
    - lib/api/         — 前端 API 调用封装（类型安全 fetch wrapper）
    - lib/ai/          — AI 提供者逻辑（providers.ts、test.ts）
    - lib/craft-templates/ — Craft 模板预设
    - lib/config/      — 配置文件（navigation.ts）
    - workers/         — 后台 worker 进程（rss-worker.ts）
    - __tests__/       — 单元测试（镜像 lib/ 和 hooks/ 目录结构，包含 utils/ 测试工具）
    - openspec/        — SDD 规格文件（不含业务代码）
    - openspec/specs/  — 已归档规格（提案时优先引用，避免重复定义）

  提交规范：Conventional Commits（feat / fix / chore / docs / refactor）
  开发策略：默认采用 TDD（Red-Green-Refactor），所有需要单元测试/测试用例的变更必须先写测试再写实现
  样式规范：Tailwind CSS utility-first，避免自定义 CSS，优先使用 CSS 变量
  组件规范：函数式组件 + React Hooks，禁止 class 组件

  可用 Skills（开发过程中按场景调用，使用 read_file 读取对应 SKILL.md）：
    - react-best-practices（路径：.claude/skills/react-best-practices/SKILL.md）
        触发时机：编写/重构 React 组件、Next.js 页面、数据获取逻辑、Bundle 优化时
        涵盖：消除瀑布请求、Bundle 体积、Server/Client 组件、重渲染优化、JS 性能等 57 条规则
    - composition-patterns（路径：.claude/skills/composition-patterns/SKILL.md）
        触发时机：组件出现大量 boolean props、构建可复用组件库、设计组合式 API、代码审查组件架构时
        涵盖：复合组件（Compound Components）、状态提升、Context 解耦、React 19 API 变更
    - web-design-guidelines（路径：.claude/skills/web-design-guidelines/SKILL.md）
        触发时机：用户要求"review UI"/"检查可访问性"/"审查设计"/"检查 UX"时
        用法：读取本地 SKILL.md 获取规则后审查目标文件

# 各 artifact 的专属规则（仅对匹配的 artifact 生效）
rules:
  proposal:
    - 文档语言必须为简体中文（zh-CN），仅技术术语可保留英文
    - 必须包含"背景与动机"和"非目标（Non-goals）"两节
    - 说明对现有页面/组件/API 的影响范围
    - 篇幅控制在 400 字以内，聚焦 What & Why，不涉及 How

  specs:
    - 文档语言必须为简体中文（zh-CN），仅技术术语可保留英文
    - 使用 Given / When / Then 格式描述场景
    - 每条需求以 "系统SHALL…" 开头（RFC 2119 风格）
    - 优先引用已有模式，避免重复定义

  design:
    - 文档语言必须为简体中文（zh-CN），仅技术术语可保留英文
    - 说明组件树或文件变更清单
    - 标注需要新增的路由（app/ 路径）
    - 若涉及数据获取，需说明是 Server Component 还是 Client Component

  tasks:
    - 文档语言必须为简体中文（zh-CN），仅技术术语可保留英文
    - 每个任务粒度不超过 2 小时
    - 任务格式：`- [ ] <动作动词> <目标文件或模块>`
    - 按"基础设施 → 测试用例（先写）→ 核心逻辑/UI 实现 → 回归测试 → 类型检查"顺序排列
    - TDD 强制规则（适用于所有需要写单元测试或测试用例的任务）：
      - 必须先新增/修改测试用例，再进行功能实现（禁止先写功能后补测试）
      - 必须先执行一次相关测试并确认失败（Red），再开始实现
      - 实现完成后必须重新执行同一批相关测试并确认全部通过（Green）
      - 可在通过后进行小步重构（Refactor），且每次重构后都需再次通过相关测试
    - 测试分层策略（按代码层级决定测试方式，不得混淆）：
      【自动化测试层】凡纯逻辑模块（无渲染依赖、可在测试环境稳定执行）必须编写 Vitest 单元测试，change 涉及时必须包含测试任务：
        - 当前常见目录包括 lib/auth/、lib/rss/、lib/db/queries/、lib/api/、lib/ai/、lib/craft-templates/、hooks/，但不限于以上目录（后续新增同类模块同样适用）
        - 任务顺序必须体现"先测试后实现"，示例：
          - `- [ ] 编写 <相关模块> 失败用例（Red）`
          - `- [ ] 实现 <相关模块> 功能使测试通过（Green）`
          - `- [ ] 重构 <相关模块> 并保持测试通过（Refactor，可选）`
      【手工测试层】以下层级禁止编写自动化测试，改为手工验证：
        - components/ — RTL 测试与组件实现细节耦合过深，mock 维护成本高，准确率低
        - app/(dashboard)/ 及所有页面文件 — Next.js Server Components 无法在 jsdom 中可靠运行
          jsdom 环境下测试页面路由层 mock 代价远超价值，测试结果可信度低
        - 涉及手工测试层时，仍需先写"测试用例/验收场景"任务，再进行实现
        - 推荐任务顺序：
          - `- [ ] 编写手工测试用例 <页面或组件>：<Given/When/Then 验收场景>`
          - `- [ ] 实现 <页面或组件> 功能`
          - `- [ ] 手工验证 <页面或组件>：<验证项描述>`
        - 手工测试任务格式：`- [ ] 手工验证 <页面或组件>：<验证项描述>`
    - 必须包含 ESLint 执行任务：`- [ ] 运行 pnpm lint 并确认无 error（无新增 warning）`
    - 不得通过新增 `eslint-disable` / `eslint-disable-next-line` / `@ts-ignore` 绕过校验（除非在任务中明确说明原因与范围）
    - 测试执行策略：只运行与本次 change 直接相关的测试文件，不得全量执行
      - 命令格式：`pnpm test <测试文件路径或匹配模式>`
      - 示例：`pnpm test __tests__/lib/rss/` 或 `pnpm test AddFeedForm`
      - 禁止使用 `.skip` / `test.skip` / `it.skip` / `describe.skip` 跳过任何用例
      - 所有被执行的测试必须 100% 通过，无失败、无报错
      - TDD 执行必须在 tasks 中体现两次测试运行：
        - `- [ ] 运行 pnpm test <相关测试路径> 并确认新用例先失败（Red）`
        - `- [ ] 运行 pnpm test <相关测试路径> 并确认全部通过（Green）`
    - 涉及自动化测试层时，必须包含测试执行任务：`- [ ] 运行 pnpm test <相关测试路径> 并确认全部通过`
    - 最后一个任务必须是：`- [ ] 运行 pnpm exec tsc --noEmit 确认零类型错误`
      TypeScript 类型检查执行规范（严格执行，不得绕过）：
        - 必须实际运行命令并检查退出码，退出码非 0 即表示存在类型错误
        - 若命令输出任何错误信息，必须逐条修复对应的源文件，不得忽略或跳过
        - 修复方式必须是修正类型定义、添加正确类型标注或调整实现逻辑
        - 禁止通过以下方式规避错误：添加 `@ts-ignore` / `@ts-expect-error` / `as any` / 类型断言强转
        - 修复后必须重新运行命令，直至输出为空且退出码为 0，才视为该任务完成
        - 不得在任务列表中将此任务标记为完成，除非已亲自确认命令输出无任何错误
